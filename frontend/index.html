<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Rush - Neon Kinetic</title>
    <link rel="icon" type="image/png" href="assets/img/favicon-nobg.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#4f5565",
                        "surface-bright": "#222c41",
                        "background": "#080e1c",
                        "on-primary": "#005f64",
                        "primary-fixed": "#00f1fe",
                        "tertiary-fixed-dim": "#4da8fe",
                        "error": "#ff716c",
                        "on-tertiary": "#003258",
                        "outline": "#6f7587",
                        "secondary-fixed": "#2ff801",
                        "primary-container": "#00f1fe",
                        "surface-container-low": "#0c1322",
                        "secondary": "#2ff801",
                        "secondary-dim": "#2be800",
                        "inverse-surface": "#faf8ff",
                        "on-secondary-fixed": "#064200",
                        "outline-variant": "#424858",
                        "secondary-container": "#106e00",
                        "on-primary-fixed": "#004145",
                        "on-error-container": "#ffa8a3",
                        "surface-container-lowest": "#000000",
                        "surface-container": "#12192a",
                        "primary-dim": "#00e2ee",
                        "tertiary-container": "#4da8fe",
                        "on-surface": "#e0e5f9",
                        "secondary-fixed-dim": "#2be800",
                        "on-secondary-fixed-variant": "#0d6200",
                        "tertiary": "#6fb5ff",
                        "surface": "#080e1c",
                        "on-tertiary-fixed-variant": "#003b66",
                        "inverse-primary": "#006a70",
                        "error-dim": "#d7383b",
                        "on-error": "#490006",
                        "surface-container-high": "#171f32",
                        "on-secondary": "#0b5800",
                        "surface-dim": "#080e1c",
                        "primary": "#99f7ff",
                        "on-surface-variant": "#a5abbd",
                        "on-background": "#e0e5f9",
                        "surface-container-highest": "#1d2539",
                        "on-tertiary-fixed": "#001930",
                        "tertiary-fixed": "#6fb5ff",
                        "tertiary-dim": "#47a2f8",
                        "surface-tint": "#99f7ff",
                        "on-tertiary-container": "#002746",
                        "on-primary-fixed-variant": "#006065",
                        "primary-fixed-dim": "#00e2ee",
                        "error-container": "#9f0519",
                        "on-primary-container": "#00555a",
                        "surface-variant": "#1d2539",
                        "on-secondary-container": "#e7ffd9"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col overflow-hidden">
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent">
        <div class="flex items-center gap-4">
            <h1 class="font-headline text-2xl font-bold tracking-tighter text-cyan-400 drop-shadow-[0_0_8px_rgba(0,242,255,0.4)] uppercase">
                Dino Rush
            </h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">Current Score</span>
                <span id="Score" class="font-headline text-2xl font-bold text-primary tracking-wider drop-shadow-[0_0_10px_rgba(0,242,255,0.5)]">0</span>
            </div>
            <div class="flex gap-2">
                <button id="openLeaderboardBtn" class="p-2 text-slate-400 hover:text-cyan-300 transition-colors duration-200 scale-95 active:scale-90 transition-transform">
                    <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 mt-16 relative">
        <div id="gameArea" class="w-full max-w-5xl h-[45vh] min-h-[260px] max-h-[450px] relative rounded-xl overflow-hidden canvas-gradient shadow-[0_0_40px_rgba(0,242,255,0.06)] group flex-shrink-0">
            <div class="absolute top-12 left-1/4 w-32 h-1 bg-surface-bright/20 rounded-full blur-sm"></div>
            <div class="absolute top-24 right-1/3 w-24 h-1 bg-surface-bright/10 rounded-full blur-sm"></div>
            <div class="absolute top-8 right-1/4 w-40 h-1 bg-surface-bright/15 rounded-full blur-sm"></div>
            <div class="absolute bottom-12 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>

            <div id="dino" class="absolute bottom-12 left-24 dino-float">
                <div class="relative w-16 h-16">
                    <div class="absolute bottom-0 w-12 h-14 bg-primary rounded-lg shadow-[0_0_15px_rgba(153,247,255,0.4)]"></div>
                    <div class="absolute top-0 right-0 w-10 h-8 bg-primary rounded-md">
                        <div class="absolute top-2 right-2 w-2 h-2 bg-on-primary rounded-full"></div>
                    </div>
                    <div class="absolute bottom-2 -left-2 w-4 h-4 bg-primary-dim rotate-45 rounded-sm"></div>
                    <div class="absolute -bottom-1 left-2 w-3 h-2 bg-primary-fixed rounded-full"></div>
                    <div class="absolute -bottom-1 left-7 w-3 h-2 bg-primary-fixed rounded-full"></div>
                </div>
            </div>

            <!-- <div id="cactus" class="absolute bottom-12 right-1/4 flex items-end gap-1">
                <div class="w-4 h-12 bg-secondary/40 rounded-t-full shadow-[0_0_10px_rgba(47,248,1,0.2)]"></div>
                <div class="w-4 h-16 bg-secondary rounded-t-full shadow-[0_0_15px_rgba(47,248,1,0.3)]"></div>
                <div class="w-4 h-8 bg-secondary/40 rounded-t-full shadow-[0_0_10px_rgba(47,248,1,0.2)]"></div>
            </div> -->
            
            <div class="absolute bottom-12 right-1/2">
                <div class="w-10 h-10 bg-error/20 rounded-lg transform rotate-12 shadow-[0_0_15px_rgba(255,113,108,0.2)]"></div>
            </div>

            <div class="absolute inset-0 pointer-events-none ring-1 ring-inset ring-white/5 rounded-xl"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-background/40 to-transparent"></div>
        </div>

        <div class="mt-4 flex gap-8">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-surface-container-high flex items-center justify-center text-primary-dim font-headline font-bold">SPACE</div>
                <span class="text-on-surface-variant font-label text-xs uppercase tracking-widest">Jump</span>
            </div>
            <!-- <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-surface-container-high flex items-center justify-center text-primary-dim font-headline font-bold">↓</div>
                <span class="text-on-surface-variant font-label text-xs uppercase tracking-widest">Duck</span>
            </div> -->
        </div>

        <div id="startGameWrapper" class="mt-6 mb-4 z-10 relative">
            <button id="startGameBtn" class="group relative px-10 py-4 bg-primary text-on-primary font-headline font-bold text-lg uppercase tracking-[0.2em] rounded-lg transition-all duration-300 hover:scale-105 active:scale-95 neon-glow">
                <span class="relative z-10">Start Game</span>
                <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity rounded-lg"></div>
                <div class="absolute -inset-1 bg-primary blur-xl opacity-20 group-hover:opacity-40 transition-opacity rounded-lg -z-10"></div>
            </button>
        </div>

        <div id="gameOverScreen" class="hidden fixed inset-0 z-40 overflow-y-auto bg-background/80 backdrop-blur-md">
            <div class="min-h-full flex flex-col items-center justify-center p-4 pb-32 pt-24">
                <section class="relative z-10 w-full max-w-lg glass-panel rounded-xl p-8 md:p-10 flex flex-col items-center text-center border-t border-white/5 shadow-2xl">
                    <div class="mb-2">
                        <span class="inline-flex items-center rounded-full bg-secondary/10 px-3 py-1 text-[0.6875rem] font-bold uppercase tracking-widest text-secondary neon-glow-text">Mission Terminated</span>
                    </div>
                    <h1 class="text-5xl md:text-6xl font-headline font-bold text-primary neon-glow-text uppercase tracking-tighter leading-none mb-6">Game Over</h1>
                    <div class="w-full bg-surface-container-high/40 rounded-lg p-6 flex flex-col items-center justify-center mb-8 border border-white/5">
                        <span class="text-xs font-label uppercase tracking-widest text-on-surface-variant mb-1">Final Score</span>
                        <span id="finalScoreDisplay" class="text-5xl font-headline font-bold text-on-surface neon-glow-text">0</span>
                    </div>
                    <div class="flex flex-col gap-4 w-full max-w-sm">
                        <button id="restartBtn" class="w-full bg-primary text-on-primary font-headline font-bold text-lg py-4 rounded-lg uppercase tracking-wider neon-glow-primary hover:bg-primary-fixed transition-all duration-300 transform hover:-translate-y-1 active:scale-95">Play Again</button>
                    </div>
                </section>
            </div>
        </div>

        <div id="leaderboardScreen" class="hidden fixed inset-0 z-40 bg-background/95 backdrop-blur-xl overflow-y-auto flex flex-col items-center">
            <div class="w-full min-h-full flex flex-col items-center pb-32 pt-24 px-4 md:px-8 relative">
                <button id="closeLeaderboardBtn" class="absolute top-24 right-6 md:right-12 text-outline hover:text-error transition-colors z-50">
                    <span class="material-symbols-outlined text-4xl">close</span>
                </button>
                <div class="w-full max-w-2xl flex flex-col gap-8">
                    <div class="text-center space-y-2 mt-8">
                        <h1 class="text-5xl font-headline font-bold text-primary tracking-tight leading-tight uppercase neon-glow-text">Top Players</h1>
                        <p class="text-on-surface-variant text-sm uppercase tracking-widest">Global Rankings</p>
                    </div>
                    <section class="w-full">
                        <div class="bg-surface-container-high/40 backdrop-blur-xl rounded-xl p-1 neon-glow-cyan">
                            <div class="bg-surface-container-lowest rounded-[calc(0.75rem-4px)] overflow-hidden">
                                <div id="leaderboardList" class="h-[400px] overflow-y-auto custom-scrollbar">
                                    <div class="flex items-center gap-4 px-6 py-5 bg-primary/5 border-b border-outline-variant/5">
                                        <div class="w-10 h-10 flex items-center justify-center font-headline font-bold text-2xl text-secondary">--</div>
                                        <div class="flex-grow">
                                            <h3 class="font-headline text-lg font-bold text-on-surface text-center">Loading Data...</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
        
        <div id="authScreen" class="absolute inset-0 z-[60] flex items-center justify-center p-4 bg-background/95 backdrop-blur-md rounded-xl">
            <div class="w-full max-w-md bg-surface-container-high/60 backdrop-blur-xl rounded-xl p-8 md:p-12 shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-outline-variant/10 relative overflow-hidden group">
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-[60px]"></div>
                <header class="text-center mb-10">
                    <div class="flex justify-center mb-6">
                        <div class="w-16 h-16 bg-surface-container-highest rounded-lg flex items-center justify-center border border-primary/20 shadow-[0_0_15px_rgba(0,242,255,0.1)]">
                            <span class="material-symbols-outlined text-primary text-4xl" data-icon="videogame_asset">videogame_asset</span>
                        </div>
                    </div>
                    <h1 id="authTitle" class="font-headline font-bold text-3xl tracking-tight text-primary drop-shadow-[0_0_8px_rgba(0,242,255,0.4)] uppercase">Welcome Back, Racer</h1>
                    <p id="authSubtitle" class="text-on-surface-variant text-sm mt-2 font-label tracking-wide">Sync your neural link to resume</p>
                </header>
                <form id="authForm" class="space-y-6">
                    <div class="space-y-2 group/input">
                        <label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant px-1" for="authUsername">Username</label>
                        <div class="relative flex items-center glow-border rounded-lg transition-all duration-300">
                            <span class="material-symbols-outlined absolute left-4 text-outline text-xl group-focus-within/input:text-primary transition-colors">person</span>
                            <input id="authUsername" class="w-full bg-surface-container-lowest/50 border-b-2 border-outline-variant/30 focus:border-primary-dim py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 rounded-t-lg transition-all outline-none font-body" placeholder="dino_rider_99" type="text" required />
                        </div>
                    </div>
                    <div class="space-y-2 group/input">
                        <div class="flex justify-between items-end px-1">
                            <label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant px-1" for="authPassword">Password</label>
                        </div>
                        <div class="relative flex items-center glow-border rounded-lg transition-all duration-300">
                            <span class="material-symbols-outlined absolute left-4 text-outline text-xl group-focus-within/input:text-primary transition-colors">lock</span>
                            <input id="authPassword" class="w-full bg-surface-container-lowest/50 border-b-2 border-outline-variant/30 focus:border-primary-dim py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/50 focus:ring-0 rounded-t-lg transition-all outline-none font-body" placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <p id="authError" class="text-error text-sm text-center hidden font-label tracking-wide"></p>
                    <button id="authSubmitBtn" class="w-full bg-primary py-4 rounded-lg font-headline font-bold text-on-primary tracking-widest uppercase shadow-[0_0_20px_0_rgba(0,242,255,0.3)] hover:shadow-[0_0_30px_0_rgba(0,242,255,0.5)] hover:bg-primary-fixed transition-all duration-300 active:scale-95 flex items-center justify-center gap-2" type="submit">
                        <span id="authBtnText">Login</span>
                        <span class="material-symbols-outlined text-xl">bolt</span>
                    </button>
                </form>
                <div class="mt-8 space-y-8">
                    <p class="text-center text-xs text-on-surface-variant font-label tracking-wide">
                        <span id="authToggleText">New to the wasteland?</span>
                        <button id="toggleAuthModeBtn" type="button" class="text-primary font-bold hover:text-primary-dim transition-colors ml-1 uppercase tracking-tighter">Create Account</button>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="fixed -bottom-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>

    <script src="script.js"></script>
</body>

</html>
